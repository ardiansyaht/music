<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="400" height="240" style="background:#0d0a0b; border-radius:16px; box-shadow: 0 8px 30px rgba(0,0,0,0.5);">
  <style>
    @keyframes spin-left {
      from { transform: translate(48px, 37px) rotate(0deg); }
      to { transform: translate(48px, 37px) rotate(360deg); }
    }
    @keyframes spin-right {
      from { transform: translate(72px, 37px) rotate(0deg); }
      to { transform: translate(72px, 37px) rotate(360deg); }
    }
    @keyframes bounce {
      0%, 100% { transform: translate(40px, 25px) translateY(0); }
      50% { transform: translate(40px, 25px) translateY(-4px); }
    }
    @keyframes floatNote1 {
      0% { transform: translate(0, 0) scale(0.8); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translate(-25px, -35px) scale(1.2); opacity: 0; }
    }
    @keyframes floatNote2 {
      0% { transform: translate(0, 0) scale(0.8); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translate(25px, -35px) scale(1.2); opacity: 0; }
    }
    .reel-left {
      transform: translate(48px, 37px);
      transform-origin: 48px 37px;
      animation: spin-left 5s linear infinite;
    }
    .reel-right {
      transform: translate(72px, 37px);
      transform-origin: 72px 37px;
      animation: spin-right 5s linear infinite;
    }
    .body {
      transform: translate(40px, 25px);
      transform-origin: 100px 95px;
      animation: bounce 3s ease-in-out infinite;
    }
    .note-1 {
      animation: floatNote1 4s ease-in-out infinite;
      transform-origin: center;
    }
    .note-2 {
      animation: floatNote2 4s ease-in-out infinite 2s;
      transform-origin: center;
    }
  </style>
  
  <!-- Floating Notes -->
  <g class="note-1" transform="translate(50, 45)">
    <rect x="0" y="4" width="3" height="3" fill="#00f5ff" />
    <rect x="3" y="4" width="3" height="3" fill="#00f5ff" />
    <rect x="6" y="0" width="3" height="3" fill="#00f5ff" />
    <rect x="6" y="3" width="3" height="3" fill="#00f5ff" />
    <rect x="6" y="6" width="3" height="3" fill="#00f5ff" />
  </g>
  <g class="note-2" transform="translate(145, 40)">
    <rect x="0" y="4" width="3" height="3" fill="#ff007f" />
    <rect x="3" y="4" width="3" height="3" fill="#ff007f" />
    <rect x="6" y="0" width="3" height="3" fill="#ff007f" />
    <rect x="6" y="3" width="3" height="3" fill="#ff007f" />
    <rect x="6" y="6" width="3" height="3" fill="#ff007f" />
  </g>

  <!-- Cassette Body Group -->
  <g class="body">
    <!-- Outer Shell -->
    <rect x="0" y="0" width="120" height="70" rx="6" fill="#1c1427" stroke="#00f5ff" stroke-width="2" />
    <rect x="6" y="6" width="108" height="58" rx="4" fill="#2d1a47" />
    
    <!-- Label -->
    <rect x="16" y="16" width="88" height="24" rx="2" fill="#e8e0ff" />
    <rect x="20" y="20" width="80" height="2" fill="#ff007f" />
    <rect x="20" y="24" width="80" height="2" fill="#00f5ff" />
    
    <!-- Center window -->
    <rect x="36" y="26" width="48" height="22" rx="2" fill="#1c1427" stroke="#e8e0ff" stroke-width="1.5" />
    
    <!-- Left Reel -->
    <g class="reel-left">
      <circle cx="0" cy="0" r="8" fill="#e8e0ff" />
      <rect x="-8" y="-2" width="16" height="4" fill="#2d1a47" />
      <rect x="-2" y="-8" width="4" height="16" fill="#2d1a47" />
      <circle cx="0" cy="0" r="4" fill="#1c1427" />
    </g>
    
    <!-- Right Reel -->
    <g class="reel-right">
      <circle cx="0" cy="0" r="8" fill="#e8e0ff" />
      <rect x="-8" y="-2" width="16" height="4" fill="#2d1a47" />
      <rect x="-2" y="-8" width="4" height="16" fill="#2d1a47" />
      <circle cx="0" cy="0" r="4" fill="#1c1427" />
    </g>

    <!-- Bottom Trapezoid cutouts -->
    <path d="M 30,70 L 40,62 L 80,62 L 90,70 Z" fill="#1c1427" stroke="#00f5ff" stroke-width="2" />
    <circle cx="48" cy="66" r="2" fill="#ff007f" />
    <circle cx="72" cy="66" r="2" fill="#ff007f" />
  </g>
</svg>
